<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LegacyLens Workspace</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css" />
  <link rel="stylesheet" href="/assets/styles.css?v=4" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>LegacyLens Workspace</h1>
      <p>RAG over legacy COBOL codebases.</p>
    </div>
  </header>

  <main class="layout">
    <section id="tab-prompt" class="tab-panel active">
      <div class="prompt-layout">
        <aside class="prompt-history-sidebar">
          <h3>History</h3>
          <ul id="prompt-history-list"></ul>
        </aside>
        <div class="prompt-main tab-content">
          <h2>Query</h2>
          <div class="prompt-area">
            <label for="query-text" class="prompt-label">Ask about your codebase</label>
            <textarea id="query-text" rows="4" placeholder="e.g. What does #ifndef __cplusplus do?"></textarea>
            <div class="prompt-suggestions" aria-label="Tips for better results">
              <span class="prompt-suggestions-label">Better results:</span>
              <button type="button" class="prompt-suggestion-bubble" data-insert="What does [file path or keyword] do? (e.g. file.cbl, EVALUATE)">Include file path or keyword</button>
              <button type="button" class="prompt-suggestion-bubble" data-insert="Explain [paragraph or function name] (e.g. CALCULATE-INTEREST, open_cob_file)">Name a paragraph or function</button>
            </div>
            <div class="prompt-actions">
              <p id="query-status" class="status"></p>
              <button id="chat-btn" class="primary chat-btn">Chat</button>
            </div>
          </div>
          <div id="chat-answer" class="chat-answer" style="display:none;"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlightjs-cobol@0.3/dist/cobol.min.js"></script>
  <script src="/assets/app.js?v=4"></script>
</body>
</html>
